<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo by Soya</title>
    <style>
        * { margin:0; padding:0; }
        html, body { height:100%; overflow:hidden; font-family: system-ui, sans-serif; }
        
        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.6s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #2ea44f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        .progress {
            width: 280px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #2ea44f;
            transition: width 0.3s;
        }
        .status { color: #555; font-size: 15px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pdf-container { width:100%; height:100vh; }
        embed { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="status">LOADING...</div>
        <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        <div id="statusText" class="status">0%</div>
    </div>

    <!-- PDF 容器 -->
    <div class="pdf-container">
        <embed id="pdfEmbed" src="soya-compressed.pdf" type="application/pdf">
    </div>

    <script>
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const embed = document.getElementById('pdfEmbed');

        let progress = 0;
        const fakeProgress = setInterval(() => {
            progress += Math.random() * 12;
            if (progress > 92) progress = 92;
            
            progressBar.style.width = progress + '%';
            statusText.textContent = Math.floor(progress) + '%';
        }, 180);

        // PDF 加载完成检测
        embed.onload = () => {
            clearInterval(fakeProgress);
            progressBar.style.width = '100%';
            statusText.textContent = '100% - 加载完成';
            
            setTimeout(() => {
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 600);
            }, 400);
        };

        // 备用超时处理（防止 onload 不触发）
        setTimeout(() => {
            if (loading.style.display !== 'none') {
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 600);
            }
        }, 15000); // 15秒后强制隐藏
    </script>
</body>
</html>
