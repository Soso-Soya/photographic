<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 查看</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin:0; padding:0; }
        html, body { height:100%; overflow:hidden; background:#f8f9fa; }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #2ea44f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #pdfViewer {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>PDF 正在加载...</div>
    </div>

    <canvas id="pdfViewer"></canvas>

    <script>
        // === 修改这里的文件名 ===
        const pdfUrl = "soya-compressed.pdf";   // ← 改成你的 PDF 文件名

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loading = document.getElementById('loading');
        const canvas = document.getElementById('pdfViewer');

        async function loadPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                
                // 渲染第一页（全屏模式通常只显示第一页，用户可滚动）
                const page = await pdf.getPage(1);
                const scale = 2.0; // 可调节清晰度
                const viewport = page.getViewport({ scale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({
                    canvasContext: canvas.getContext('2d'),
                    viewport: viewport
                }).promise;

                loading.style.display = 'none';
            } catch (err) {
                loading.innerHTML = `<p style="color:red;">加载失败<br>请尝试刷新页面</p>`;
                console.error(err);
            }
        }

        loadPDF();
    </script>
</body>
</html>
