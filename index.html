<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo by Soya</title>
    <style>
        * { margin:0; padding:0; }
        html, body { height:100%; overflow:hidden; background:#fafafa; }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #eee;
            border-top-color: #2ea44f;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pdf-container { width:100%; height:100vh; }
        embed { width:100%; height:100%; border:none; }
    </style>
</head>
<body>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>

    <div class="pdf-container">
        <!-- 这里使用版本号控制缓存，修改 v= 即可强制更新 -->
        <embed id="pdfEmbed" 
               src="soya-compressed.pdf?v=20250629" 
               type="application/pdf">
    </div>

    <script>
        const loading = document.getElementById('loading');
        const embed = document.getElementById('pdfEmbed');

        embed.onload = () => {
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 400);
        };

        // 备用超时
        setTimeout(() => {
            if (loading.style.display !== 'none') loading.style.display = 'none';
        }, 10000);
    </script>
</body>
</html>
