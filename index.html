<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo by Soya</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; background:#f8f9fa; }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #2ea44f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        .text {
            color: #333;
            font-size: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .pdf-container { width:100%; height:100vh; }
        embed { width:100%; height:100%; border: none; }
    </style>
</head>
<body>

    <!-- 加载动画 -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="text">Loading... </div>
    </div>

    <!-- PDF -->
    <div class="pdf-container">
        <embed id="pdfEmbed" src="soya-compressed.pdf" type="application/pdf">
    </div>

    <script>
        const loading = document.getElementById('loading');
        const embed = document.getElementById('pdfEmbed');

        // PDF 加载完成隐藏动画
        embed.onload = () => {
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 500);
        };

        // 备用：最长等待 8 秒强制隐藏（防止 onload 不触发）
        setTimeout(() => {
            if (loading.style.display !== 'none') {
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 500);
            }
        }, 8000);
    </script>
</body>
</html>
